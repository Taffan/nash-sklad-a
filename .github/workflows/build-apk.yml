name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/adoptopenjdk-17-hotspot

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3️⃣ Setup Android SDK
      - uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      # 4️⃣ Generate keystore if missing
      - name: Generate keystore
        run: |
          mkdir -p app
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
            echo "Loaded keystore from secrets"
          else
            echo "Generating new keystore..."
            keytool -genkeypair \
              -keystore app/keystore.jks \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 9125 \
              -storepass nashsklad123 \
              -keypass nashsklad123 \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "Keystore generated at app/keystore.jks"
          fi

      # 5️⃣ Copy icons to all mipmap folders
      - name: Copy icons
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p app/app/src/main/res/mipmap-$d
            cp icon-192.png app/app/src/main/res/mipmap-$d/ic_launcher.png
          done
          echo "Icons copied to mipmap folders"

      # 6️⃣ Build Debug APK
      - name: Build Debug APK
        run: ./gradlew -p app assembleDebug --stacktrace --info

      # 7️⃣ Build Release APK
      - name: Build Release APK
        run: ./gradlew -p app assembleRelease --stacktrace --info

      # 8️⃣ Upload Debug APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 9️⃣ Upload Release APK
      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
