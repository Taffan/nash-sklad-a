name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # 1️⃣ Checkout repo
      - uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      # 3️⃣ Setup Android SDK
      - name: Set up Android SDK
        uses: android-actions/setup-android@v2
        with:
          api-level: 34
          build-tools: 34.0.0

      # 4️⃣ Generate or load keystore
      - name: Generate keystore
        run: |
          PASS="${{ secrets.KEYSTORE_PASSWORD }}"
          if [ -z "$PASS" ]; then PASS="nashsklad123"; fi
          echo "KS_PASS=$PASS" >> $GITHUB_ENV

          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
          else
            keytool -genkeypair \
              -keystore keystore.jks -alias upload \
              -keyalg RSA -keysize 2048 -validity 9125 \
              -storepass "$PASS" -keypass "$PASS" \
              -dname "CN=NashSklad,O=NashSklad,C=RU" \
              -noprompt
            echo "keystore_is_new=true" >> $GITHUB_ENV
          fi

      # 5️⃣ Inline JS libraries (твой существующий шаг)
      - name: Inline JS libraries into HTML
        run: |
          python3 - << 'PYEOF'
          import urllib.request, re
          with open("index.html", encoding="utf-8") as f:
            html = f.read()
          libs = [
            ("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js",
             '<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>'),
            ("https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js",
             '<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>'),
            ("https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js",
             '<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>'),
          ]
          for url, tag in libs:
            try:
              with urllib.request.urlopen(url, timeout=30) as r:
                code = r.read().decode("utf-8", errors="replace")
              html = html.replace(tag, f"<script>\n{code}\n</script>")
            except:
              pass
          with open("index.html", "w", encoding="utf-8") as f:
            f.write(html)
          PYEOF

      # 6️⃣ Создание Android проекта (твой существующий Python шаг)
      - name: Create WebView Android project
        run: python3 create_webview_project.py  # лучше вынести твой огромный скрипт в отдельный файл

      # 7️⃣ Copy icons
      - name: Copy icons
        run: |
          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp icon-192.png app/app/src/main/res/mipmap-$d/ic_launcher.png
          done

      # 8️⃣ Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      # 9️⃣ Build release APK
      - name: Build release APK
        run: |
          echo "sdk.dir=$ANDROID_HOME" > app/local.properties
          cd app
          ./gradlew assembleRelease --no-daemon

      # 🔟 Upload APK
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NashSklad-APK
          path: app/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      # 1️⃣1️⃣ Print keystore base64 (если сгенерирован новый)
      - name: Print keystore base64
        if: env.keystore_is_new == 'true'
        run: |
          echo "=== Сохраните как KEYSTORE_BASE64 ==="
          base64 keystore.jks
